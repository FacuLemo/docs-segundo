site_name: Desarrollo Backend
theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.jpeg
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: green
      accent: deep purple

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep orange
  font:
    text: Merriweather Sans
    code: Red Hat Mono

extra_css:
  - stylesheets/custom.css

nav:
 - Clase 1. Inicio de cursada: index.md
 - Clase 2. Crear un proyecto de FastAPI: clase2.md
 - Clase 3. el protocolo HTTP : clase3.md
 - Clase 4. Documentación automática; Lectura y Creación de datos: clase4.md
 - Clase 5. Actualización y Borrado de datos: clase5.md
 - Clase 6. Validaciones y Pydantic: clase6.md
#   - Clase 7. Pydantic Avanzado & REST Clients: clase7.md
#   - Clase 8. Documentación y Response Model clase8.md
#   - Clase 9. Modularización con APIRouter: clase9.md
#   - Clase 10. Persistencia de Datos con SQLite y SQLAlchemy: clase10.md


markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
